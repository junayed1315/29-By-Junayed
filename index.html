<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>29 Card Game - Junayed</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Allura&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle, #0d3b11 0%, #050505 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            color: white;
        }

        .game-table {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 600px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 50px;
        }

        /* Player Styling */
        .player {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .card-slot {
            height: 80px;
            width: 60px;
            background: rgba(0, 0, 0, 0.45);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        /* Positions */
        .partner { top: 30px; left: 50%; transform: translateX(-50%); color: #ff80ab; }
        .opp1 { left: 15px; top: 40%; transform: translateY(-50%); color: #b2ff59; }
        .opp2 { right: 15px; top: 40%; transform: translateY(-50%); color: #b2ff59; }
        .user { bottom: 100px; left: 50%; transform: translateX(-50%); color: #00e5ff; }

        /* Board Central Area */
        .board {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .played-card {
            width: 65px;
            height: 90px;
            background: white;
            color: black;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* Controls */
        .controls {
            position: absolute;
            bottom: 150px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid #00e5ff;
            color: #00e5ff;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Orbitron';
        }

        .btn:hover { background: #00e5ff; color: black; }

        .score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 10px;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Allura', cursive;
            font-size: 28px;
            color: #ffc107;
        }
    </style>
</head>
<body>

    <div class="score-board">
        <div>Us: <span id="team1">0</span></div>
        <div>Them: <span id="team2">0</span></div>
        <div style="color: #ffc107; margin-top:5px;">Bid: <span id="currentBid">16</span></div>
    </div>

    <div class="game-table">
        <div class="player partner"><span>Fall In Love</span><div class="card-slot">🎴</div></div>
        <div class="player opp1"><span>Sanjana</span><div class="card-slot">🎴</div></div>
        <div class="player opp2"><span>Mahin</span><div class="card-slot">🎴</div></div>
        
        <div class="board">
            <div id="cardOnTable" class="played-card">J</div>
        </div>

        <div class="controls">
            <button class="btn" onclick="playCard()">Play Card</button>
            <button class="btn" onclick="newBid()">Raise Bid</button>
        </div>

        <div class="player user">
            <span>@junayed_8768</span>
            <div class="card-slot" id="userCard">J</div>
        </div>

        <div class="footer">Made By @junayed_8768</div>
    </div>

    <script>
        let bid = 16;
        let scoreUs = 0;
        let scoreThem = 0;
        const cards = ['J', '9', 'A', '10', 'K', 'Q', '8', '7'];

        function playCard() {
            // Randomly pick a card to simulate play
            let randomCard = cards[Math.floor(Math.random() * cards.length)];
            document.getElementById('cardOnTable').innerText = randomCard;
            document.getElementById('userCard').innerText = randomCard;
            
            // Randomly update score for fun
            if(Math.random() > 0.5) {
                scoreUs += 3;
                document.getElementById('team1').innerText = scoreUs;
            } else {
                scoreThem += 2;
                document.getElementById('team2').innerText = scoreThem;
            }
        }

        function newBid() {
            if(bid < 28) {
                bid++;
                document.getElementById('currentBid').innerText = bid;
            } else {
                alert("Maximum bid 28 reached!");
            }
        }
    </script>
</body>
</html>
